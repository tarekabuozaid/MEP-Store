<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Access Denied</title>
  <style>
    body {
      font-family: 'Segoe UI', 'Inter', Tahoma, Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a3c5e 0%, #2563eb 100%);
      padding: 1rem;
    }
    .error-card {
      background: white;
      border-radius: 12px;
      padding: 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    h1 {
      color: #dc2626;
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
    }
    p {
      color: #4b5563;
      margin: 0.5rem 0;
      line-height: 1.6;
    }
    .message {
      background: #fef2f2;
      border: 1px solid #fecaca;
      padding: 1rem;
      border-radius: 8px;
      margin: 1.5rem 0;
      color: #7f1d1d;
      font-size: 0.95rem;
      word-break: break-word;
    }
    .help {
      background: #eff6ff;
      border-left: 4px solid #2563eb;
      padding: 1rem;
      border-radius: 6px;
      margin-top: 1.25rem;
      text-align: left;
      font-size: 0.9rem;
      color: #1e40af;
    }
    .footer {
      margin-top: 1.5rem;
      color: #9ca3af;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="icon">🔒</div>
    <h1>Access Denied</h1>
    <div class="message"><?!= message ?></div>
    <div class="help">
      <strong>To get access:</strong><br>
      Contact your system administrator to add your email to the authorized users list.
    </div>
    <div class="footer">
      Aldhafra IMS v2.0
    </div>
  </div>
</body>
</html>
