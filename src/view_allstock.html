<script>
  // ─── Admin All Stock View — items × locations matrix ───────────
  async function renderAllStockView(container) {
    container.innerHTML = '<div class="card"><div class="text-center"><div class="spinner"></div></div></div>';

    const [stockRows, locations] = await Promise.all([
      callApi('api_getStockByLocation', '*'),
      getLocations()
    ]);

    const itemMap = {};
    stockRows.forEach(r => {
      if (!itemMap[r.itemCode]) {
        itemMap[r.itemCode] = {
          itemCode: r.itemCode,
          itemName: r.itemName,
          unit:     r.unit,
          minStock: r.minStock,
          balances: {},
          total:    0
        };
      }
      itemMap[r.itemCode].balances[r.location] = { balance: r.balance, status: r.status };
      itemMap[r.itemCode].total += r.balance;
    });

    const items = Object.values(itemMap).sort((a, b) => a.itemCode.localeCompare(b.itemCode));

    container.innerHTML = `
      <div class="card">
        <div class="card-header"><h2>📦 Stock Balances — All Stores</h2></div>

        <div class="flex-gap mb-2" style="align-items:center;">
          <input type="text" id="allStockSearch" placeholder="🔍 Search..." style="flex:1;" oninput="filterAllStock()">
          <label class="flex" style="align-items:center;gap:0.3rem;font-weight:normal;">
            <input type="checkbox" id="allStockLowOnly" onchange="filterAllStock()" style="width:auto;">
            Low stock only
          </label>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Code</th>
                <th>Item</th>
                <th>Unit</th>
                ${locations.map(l => `<th class="text-end">${escapeHtml(l.storeName)}<br><small class="text-muted">${escapeHtml(l.storeCode)}</small></th>`).join('')}
                <th class="text-end" style="background:#1d4ed8;">Total</th>
                <th class="text-end">Min Stock</th>
              </tr>
            </thead>
            <tbody id="allStockTbody"></tbody>
          </table>
        </div>
      </div>
    `;

    window.__allStockData = items;
    window.__allStockLocations = locations;
    renderAllStockRows(items);
  }

  function filterAllStock() {
    const search = (document.getElementById('allStockSearch').value || '').toLowerCase();
    const lowOnly = document.getElementById('allStockLowOnly').checked;
    let filtered = window.__allStockData;
    if (search) {
      filtered = filtered.filter(i =>
        i.itemCode.toLowerCase().includes(search) ||
        i.itemName.toLowerCase().includes(search)
      );
    }
    if (lowOnly) {
      filtered = filtered.filter(i => {
        if (i.minStock > 0 && i.total < i.minStock) return true;
        return Object.values(i.balances).some(b => b.status !== 'OK');
      });
    }
    renderAllStockRows(filtered);
  }

  function renderAllStockRows(items) {
    const tbody = document.getElementById('allStockTbody');
    const locations = window.__allStockLocations;
    const colCount = 5 + locations.length;

    if (items.length === 0) {
      tbody.innerHTML = `<tr><td colspan="${colCount}" class="text-center text-muted" style="padding:2rem;">No items found</td></tr>`;
      return;
    }

    tbody.innerHTML = items.map(i => `
      <tr>
        <td><code>${escapeHtml(i.itemCode)}</code></td>
        <td>${escapeHtml(i.itemName)}</td>
        <td>${escapeHtml(i.unit)}</td>
        ${locations.map(l => {
          const b = i.balances[l.storeCode] || { balance: 0, status: 'ZERO' };
          const cls = b.status === 'ZERO' ? 'text-danger' : (b.status === 'LOW' ? 'text-warning' : '');
          return `<td class="text-end ${cls}"><strong>${b.balance}</strong></td>`;
        }).join('')}
        <td class="text-end" style="background:#eff6ff;"><strong>${i.total}</strong></td>
        <td class="text-end text-muted">${i.minStock || '—'}</td>
      </tr>
    `).join('');
  }
</script>
