<script>
  // ─── Entry Form View ────────────────────────────────────────────
  async function renderEntryView(container) {
    // Only load locations upfront (6 rows). Items (7163) are loaded lazily
    // on first autocomplete keystroke — avoids freezing the renderer.
    const locations = await getLocations();
    const isAdmin = App.user.role === 'Admin';
    const defaultLocation = isAdmin ? '' : App.user.storeCode;
    const userLocations = isAdmin ? locations : locations.filter(l => l.storeCode === App.user.storeCode);

    container.innerHTML = `
      <div class="card">
        <div class="card-header"><h2>📝 New Transaction</h2></div>

        <div id="entry-alerts"></div>

        <div class="form-row">
          <div>
            <label class="required">Transaction Type</label>
            <select id="txnType" onchange="onTxnTypeChange()">
              <option value="Receipt">Receipt</option>
              <option value="Issuance">Issuance</option>
              <option value="Adjustment">Adjustment</option>
              <option value="Transfer">Transfer</option>
            </select>
          </div>
          <div>
            <label class="required">Date</label>
            <input type="date" id="txnDate" value="${todayString()}">
          </div>
          <div>
            <label class="required">Source Location</label>
            <select id="sourceLocation" ${isAdmin ? '' : 'disabled'}>
              ${isAdmin ? '<option value="">-- Select location --</option>' : ''}
              ${userLocations.map(l => `<option value="${escapeHtml(l.storeCode)}" ${l.storeCode === defaultLocation ? 'selected' : ''}>${escapeHtml(l.storeName)} (${escapeHtml(l.storeCode)})</option>`).join('')}
            </select>
          </div>
          <div id="destLocationWrap" class="hidden">
            <label class="required">Destination</label>
            <select id="destLocation">
              <option value="">-- Select destination --</option>
              ${locations.map(l => `<option value="${escapeHtml(l.storeCode)}">${escapeHtml(l.storeName)} (${escapeHtml(l.storeCode)})</option>`).join('')}
            </select>
          </div>
        </div>

        <div class="form-row">
          <div><label>LPO Number</label><input type="text" id="lpo"></div>
          <div id="supplierWrap"><label>Supplier</label><input type="text" id="supplier"></div>
          <div id="requesterWrap" class="hidden"><label>Requester</label><input type="text" id="requester"></div>
          <div id="receiverWrap" class="hidden"><label>Receiver</label><input type="text" id="receiver"></div>
        </div>

        <div class="form-group">
          <label>Notes</label>
          <textarea id="notes" rows="2"></textarea>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2>Items</h2>
          <div class="flex-gap">
            <button class="btn btn-secondary btn-sm" onclick="showPasteModal()" title="Paste multiple rows from Excel">📋 Paste from Excel</button>
            <button class="btn btn-secondary btn-sm" onclick="addItemRow()">+ Add Row</button>
          </div>
        </div>

        <div class="table-wrap items-table">
          <table>
            <thead>
              <tr>
                <th style="width:40px;">#</th>
                <th style="width:220px;">Item Code</th>
                <th>Name</th>
                <th style="width:80px;">Unit</th>
                <th style="width:130px;">
                  Quantity
                  <button class="btn btn-secondary btn-sm"
                    onclick="showPasteQtyModal()"
                    title="Paste quantities from Excel (one number per line)"
                    style="font-size:0.7rem;padding:0.15rem 0.4rem;margin-left:4px;vertical-align:middle;">
                    📋
                  </button>
                </th>
                <th style="width:40px;"></th>
              </tr>
            </thead>
            <tbody id="itemsTbody"></tbody>
          </table>
        </div>

        <div class="flex-gap" style="justify-content:flex-end; margin-top:1.25rem;">
          <button class="btn btn-secondary" onclick="resetEntry()">Reset</button>
          <button class="btn btn-success" id="submitBtn" onclick="submitEntry()">💾 Save Transaction</button>
        </div>
      </div>
    `;

    window.__entryRowIndex = 0;
    addItemRow();
    addItemRow();
    addItemRow();
    onTxnTypeChange();
  }

  // ─── Excel Paste Feature ────────────────────────────────────────

  /**
   * Show the paste-from-Excel modal.
   * Expected clipboard format: ItemCode [TAB] Qty  (one row per line)
   */
  function showPasteModal() {
    showModal(`
      <h3>📋 Paste from Excel</h3>
      <p class="text-muted" style="font-size:0.88rem;margin-bottom:0.75rem;">
        Copy 2 columns from Excel — <strong>Item Code</strong> and <strong>Quantity</strong> — then paste below.<br>
        Tab-separated, one item per line. Extra columns are ignored.
      </p>

      <div style="background:#f8fafc;border:1px solid #e5e7eb;border-radius:6px;padding:0.6rem 0.75rem;
                  font-family:monospace;font-size:0.78rem;color:#6b7280;margin-bottom:0.75rem;">
        Example:&nbsp;&nbsp;&nbsp;2500062884&nbsp;&nbsp;&nbsp;[TAB]&nbsp;&nbsp;&nbsp;10<br>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;2500062885&nbsp;&nbsp;&nbsp;[TAB]&nbsp;&nbsp;&nbsp;5<br>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ABC-001&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;[TAB]&nbsp;&nbsp;&nbsp;3
      </div>

      <textarea id="pasteTextarea"
        rows="10"
        style="font-family:monospace;font-size:0.85rem;resize:vertical;"
        placeholder="Paste your Excel rows here (Ctrl+V)..."
        oninput="onPasteTextareaInput(this)"></textarea>

      <div id="pasteRowCount" style="font-size:0.82rem;color:#6b7280;margin-top:0.4rem;"></div>
      <div id="pasteValidation" style="margin-top:0.75rem;"></div>

      <div class="modal-actions" style="margin-top:1rem;">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="pasteValidateBtn" onclick="validatePaste()">🔍 Validate</button>
        <button class="btn btn-success hidden" id="pasteInsertBtn" onclick="insertPastedRows()">✅ Insert Rows</button>
      </div>
    `);

    // Auto-focus textarea so user can paste immediately
    setTimeout(() => {
      const ta = document.getElementById('pasteTextarea');
      if (ta) ta.focus();
    }, 100);
  }

  /** Update row count hint as user types/pastes */
  function onPasteTextareaInput(ta) {
    const lines = ta.value.trim().split('\n').filter(l => l.trim());
    const countEl = document.getElementById('pasteRowCount');
    if (countEl) {
      countEl.textContent = lines.length > 0 ? lines.length + ' line(s) detected' : '';
    }
    // Reset validation if text changes
    const valEl = document.getElementById('pasteValidation');
    if (valEl) valEl.innerHTML = '';
    const insertBtn = document.getElementById('pasteInsertBtn');
    if (insertBtn) insertBtn.classList.add('hidden');
  }

  /**
   * Parse pasted text into [{code, qty, raw}] array.
   * Handles: TAB, multiple spaces, comma, semicolon separators.
   */
  function parsePasteText(text) {
    const lines = text.split('\n');
    const parsed = [];
    lines.forEach((line, idx) => {
      const raw = line.trim();
      if (!raw) return;

      // Try TAB first, then 2+ spaces, then comma/semicolon
      let parts;
      if (raw.includes('\t')) {
        parts = raw.split('\t').map(p => p.trim()).filter(p => p);
      } else if (/  +/.test(raw)) {
        parts = raw.split(/  +/).map(p => p.trim()).filter(p => p);
      } else if (raw.includes(',')) {
        parts = raw.split(',').map(p => p.trim()).filter(p => p);
      } else if (raw.includes(';')) {
        parts = raw.split(';').map(p => p.trim()).filter(p => p);
      } else {
        // Single token — code only, no qty
        parts = [raw];
      }

      const code = parts[0] || '';
      const qtyRaw = parts[1] || '';
      const qty = qtyRaw !== '' ? parseFloat(qtyRaw.replace(/,/g, '')) : null;

      parsed.push({ code: code, qty: qty, qtyRaw: qtyRaw, raw: raw, lineNo: idx + 1 });
    });
    return parsed;
  }

  /** Validate pasted rows against Master_Items cache, show results in modal.
   *
   * Three tiers:
   *  READY   — code found in master + valid qty → inserted as-is
   *  WARNING — code found but qty missing/invalid → inserted with empty qty (user fills manually)
   *  WARNING — code NOT in master → inserted as-is with note (new item, fill name manually or add via Admin)
   *  ERROR   — completely unparseable row (no code at all)
   */
  async function validatePaste() {
    const ta = document.getElementById('pasteTextarea');
    const valEl = document.getElementById('pasteValidation');
    const insertBtn = document.getElementById('pasteInsertBtn');
    const validateBtn = document.getElementById('pasteValidateBtn');

    if (!ta || !ta.value.trim()) {
      valEl.innerHTML = '<div class="alert alert-warning">Please paste some rows first.</div>';
      return;
    }

    validateBtn.disabled = true;
    validateBtn.textContent = '⏳ Validating...';

    const items = await getItems();
    // Build O(1) lookup map: UPPER_CODE → item
    const itemMap = {};
    items.forEach(i => { itemMap[i.itemCode.toUpperCase()] = i; });

    const parsed = parsePasteText(ta.value);
    const ready    = [];   // code found + qty ok
    const warnings = [];   // code found but qty missing, OR code unknown
    const errors   = [];   // truly unparseable (no code)

    parsed.forEach(row => {
      if (!row.code) {
        errors.push({ ...row, reason: 'Empty line or no item code' });
        return;
      }

      const item = itemMap[row.code.toUpperCase()];
      const qtyNum = row.qty;
      const qtyOk  = qtyNum !== null && !isNaN(qtyNum) && qtyNum !== 0;

      if (!item) {
        // Unknown code — accept as new/unknown item with warning
        warnings.push({
          ...row,
          item:    { itemCode: row.code, itemName: '', unit: '', minStock: 0 },
          qty:     qtyOk ? qtyNum : null,
          warnMsg: '⚠ Code not in master list — will be added as unknown item'
        });
      } else if (!qtyOk) {
        // Known code but qty missing/invalid — insert with empty qty
        warnings.push({
          ...row,
          item:    item,
          qty:     null,
          warnMsg: row.qtyRaw === ''
            ? '⚠ Quantity missing — fill manually after insert'
            : '⚠ Invalid quantity "' + row.qtyRaw + '" — fill manually after insert'
        });
      } else {
        ready.push({ ...row, item: item, qty: qtyNum });
      }
    });

    // All insertable rows = ready + warnings (both get inserted)
    window.__pasteValidRows = [...ready, ...warnings];

    // Build validation summary HTML
    let html = '';

    if (ready.length > 0) {
      html += '<div class="alert alert-success" style="margin-bottom:0.5rem;">' +
        '<strong>✅ ' + ready.length + ' row(s) ready:</strong>' +
        '<ul style="margin:0.4rem 0 0;font-size:0.82rem;">' +
        ready.slice(0, 8).map(r =>
          '<li><code>' + escapeHtml(r.item.itemCode) + '</code> — ' +
          escapeHtml(r.item.itemName) + ' — Qty: <strong>' + r.qty + '</strong> ' +
          escapeHtml(r.item.unit) + '</li>'
        ).join('') +
        (ready.length > 8 ? '<li class="text-muted">... and ' + (ready.length - 8) + ' more</li>' : '') +
        '</ul></div>';
    }

    if (warnings.length > 0) {
      html += '<div class="alert alert-warning" style="margin-bottom:0.5rem;">' +
        '<strong>⚠ ' + warnings.length + ' row(s) inserted with warnings (fill manually):</strong>' +
        '<ul style="margin:0.4rem 0 0;font-size:0.82rem;">' +
        warnings.slice(0, 8).map(r =>
          '<li><code>' + escapeHtml(r.item.itemCode) + '</code>' +
          (r.item.itemName ? ' — ' + escapeHtml(r.item.itemName) : '') +
          ' — ' + escapeHtml(r.warnMsg) + '</li>'
        ).join('') +
        (warnings.length > 8 ? '<li class="text-muted">... and ' + (warnings.length - 8) + ' more</li>' : '') +
        '</ul></div>';
    }

    if (errors.length > 0) {
      html += '<div class="alert alert-error">' +
        '<strong>❌ ' + errors.length + ' line(s) skipped (no code):</strong>' +
        '<ul style="margin:0.4rem 0 0;font-size:0.82rem;">' +
        errors.slice(0, 5).map(r => '<li>Line ' + r.lineNo + ': "' + escapeHtml(r.raw) + '" — ' + escapeHtml(r.reason) + '</li>').join('') +
        '</ul></div>';
    }

    if (ready.length === 0 && warnings.length === 0 && errors.length === 0) {
      html = '<div class="alert alert-warning">No data found. Please check the format and try again.</div>';
    }

    valEl.innerHTML = html;
    validateBtn.disabled = false;
    validateBtn.textContent = '🔍 Validate';

    // Insert button shows if there's anything to insert (ready OR warnings)
    if (ready.length > 0 || warnings.length > 0) {
      const total = ready.length + warnings.length;
      insertBtn.textContent = '✅ Insert ' + total + ' Row(s)';
      insertBtn.classList.remove('hidden');
    } else {
      insertBtn.classList.add('hidden');
    }
  }

  /** Insert validated rows into the items table */
  async function insertPastedRows() {
    const rows = window.__pasteValidRows || [];
    if (!rows.length) return;

    // Clear existing EMPTY rows first (code='' and qty='')
    document.querySelectorAll('#itemsTbody tr').forEach(tr => {
      const code = (tr.querySelector('.item-code').value || '').trim();
      const qty  = (tr.querySelector('.item-qty').value || '').trim();
      if (!code && !qty) tr.remove();
    });

    const txnType = document.getElementById('txnType').value;
    const location = document.getElementById('sourceLocation').value;
    const needBalance = (txnType === 'Issuance' || txnType === 'Transfer') && location;

    // Insert each valid row
    for (const row of rows) {
      const tbody = document.getElementById('itemsTbody');
      const idx = ++window.__entryRowIndex;
      const tr = document.createElement('tr');
      tr.dataset.rowIdx = idx;
      tr.dataset.itemCode = row.item.itemCode;
      tr.dataset.itemName = row.item.itemName;
      tr.dataset.itemUnit = row.item.unit;
      tr.dataset.minStock = row.item.minStock;

      const hasQty    = row.qty !== null && row.qty !== undefined;
      const isNewItem = !row.item.itemName;  // code not in master

      tr.innerHTML = `
        <td>${idx}</td>
        <td>
          <div class="autocomplete-wrap">
            <input type="text" class="item-code" value="${escapeHtml(row.item.itemCode)}"
              oninput="onItemCodeInput(this)" autocomplete="off"
              style="${isNewItem ? 'border-color:var(--color-warning);' : ''}">
          </div>
        </td>
        <td>
          <span class="item-name ${isNewItem ? 'text-warning' : ''}">
            ${isNewItem ? '⚠ New item' : escapeHtml(row.item.itemName)}
          </span>
        </td>
        <td><span class="item-unit text-muted">${escapeHtml(row.item.unit || '—')}</span></td>
        <td>
          <input type="number" class="item-qty" value="${hasQty ? row.qty : ''}" step="any"
            oninput="onQtyInput(this)"
            placeholder="${hasQty ? '' : 'Enter qty'}"
            style="${hasQty ? '' : 'border-color:var(--color-warning);'}">
          <div class="balance-hint"></div>
        </td>
        <td><button class="btn btn-secondary btn-sm" onclick="removeItemRow(this)" title="Remove row">✕</button></td>
      `;
      tbody.appendChild(tr);

      // Load balance for Issuance/Transfer
      if (needBalance) {
        try {
          const balance = await callApi('api_getBalance', row.item.itemCode, location);
          tr.dataset.balance = balance;
          updateBalanceHint(tr);
        } catch (e) { /* ignore */ }
      }
    }

    // Ensure at least one empty row remains for manual additions
    const tbody = document.getElementById('itemsTbody');
    const allFilled = Array.from(tbody.querySelectorAll('tr')).every(tr =>
      (tr.querySelector('.item-code').value || '').trim() !== ''
    );
    if (allFilled) addItemRow();

    closeModal();
    showToast('✅ ' + rows.length + ' row(s) inserted', 'success');

    // Scroll to table
    tbody.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ─── Existing row management ───────────────────────────────────

  function onTxnTypeChange() {
    const type = document.getElementById('txnType').value;
    const destWrap = document.getElementById('destLocationWrap');
    const supplierWrap = document.getElementById('supplierWrap');
    const requesterWrap = document.getElementById('requesterWrap');
    const receiverWrap = document.getElementById('receiverWrap');

    destWrap.classList.toggle('hidden', type !== 'Transfer');
    supplierWrap.classList.toggle('hidden', type !== 'Receipt');
    requesterWrap.classList.toggle('hidden', type !== 'Issuance' && type !== 'Transfer');
    receiverWrap.classList.toggle('hidden', type !== 'Receipt' && type !== 'Transfer');
  }

  function addItemRow() {
    const tbody = document.getElementById('itemsTbody');
    const idx = ++window.__entryRowIndex;
    const tr = document.createElement('tr');
    tr.dataset.rowIdx = idx;
    tr.innerHTML = `
      <td>${idx}</td>
      <td>
        <div class="autocomplete-wrap">
          <input type="text" class="item-code" placeholder="Search by code or name..." oninput="onItemCodeInput(this)" autocomplete="off">
        </div>
      </td>
      <td><span class="item-name text-muted">—</span></td>
      <td><span class="item-unit text-muted">—</span></td>
      <td>
        <input type="number" class="item-qty" step="any" oninput="onQtyInput(this)">
        <div class="balance-hint"></div>
      </td>
      <td><button class="btn btn-secondary btn-sm" onclick="removeItemRow(this)" title="Remove row">✕</button></td>
    `;
    tbody.appendChild(tr);
  }

  function removeItemRow(btn) {
    const tbody = document.getElementById('itemsTbody');
    if (tbody.children.length > 1) {
      btn.closest('tr').remove();
    }
  }

  async function onItemCodeInput(input) {
    const query = input.value.trim();
    const wrap = input.parentElement;
    let list = wrap.querySelector('.autocomplete-list');
    if (!query || query.length < 1) {
      if (list) list.remove();
      clearItemRow(input.closest('tr'));
      return;
    }

    const items = await getItems();
    const q = query.toUpperCase();
    const matches = items.filter(i =>
      i.itemCode.toUpperCase().includes(q) || i.itemName.toUpperCase().includes(q)
    ).slice(0, 8);

    if (!list) {
      list = document.createElement('div');
      list.className = 'autocomplete-list';
      wrap.appendChild(list);
    }

    if (matches.length === 0) {
      list.innerHTML = '<div class="autocomplete-item text-muted">No matches</div>';
      return;
    }

    list.innerHTML = matches.map(m => `
      <div class="autocomplete-item" onclick="selectItem(this, '${escapeHtml(m.itemCode)}', '${escapeHtml(m.itemName)}', '${escapeHtml(m.unit)}', ${m.minStock})">
        <span class="code">${escapeHtml(m.itemCode)}</span> — ${escapeHtml(m.itemName)} <span class="text-muted">(${escapeHtml(m.unit)})</span>
      </div>
    `).join('');
  }

  async function selectItem(el, code, name, unit, minStock) {
    const tr = el.closest('tr');
    tr.querySelector('.item-code').value = code;
    tr.querySelector('.item-name').textContent = name;
    tr.querySelector('.item-name').classList.remove('text-muted');
    tr.querySelector('.item-unit').textContent = unit;
    tr.querySelector('.item-unit').classList.remove('text-muted');
    tr.dataset.itemCode = code;
    tr.dataset.itemName = name;
    tr.dataset.itemUnit = unit;
    tr.dataset.minStock = minStock;
    el.closest('.autocomplete-list').remove();

    const txnType = document.getElementById('txnType').value;
    const location = document.getElementById('sourceLocation').value;
    if ((txnType === 'Issuance' || txnType === 'Transfer') && location) {
      try {
        const balance = await callApi('api_getBalance', code, location);
        tr.dataset.balance = balance;
        updateBalanceHint(tr);
      } catch (e) { /* ignore */ }
    }
  }

  function clearItemRow(tr) {
    tr.querySelector('.item-name').textContent = '—';
    tr.querySelector('.item-name').classList.add('text-muted');
    tr.querySelector('.item-unit').textContent = '—';
    tr.querySelector('.item-unit').classList.add('text-muted');
    tr.querySelector('.balance-hint').textContent = '';
    delete tr.dataset.itemCode;
    delete tr.dataset.balance;
  }

  function onQtyInput(input) {
    updateBalanceHint(input.closest('tr'));
  }

  function updateBalanceHint(tr) {
    const hint = tr.querySelector('.balance-hint');
    if (!tr.dataset.balance) { hint.textContent = ''; return; }
    const balance = Number(tr.dataset.balance);
    const qty = Number(tr.querySelector('.item-qty').value) || 0;
    const minStock = Number(tr.dataset.minStock) || 0;
    const txnType = document.getElementById('txnType').value;

    if (txnType === 'Issuance' || txnType === 'Transfer') {
      const remaining = balance - qty;
      let cls = '';
      let text = 'Available: ' + balance;
      if (qty > balance) { cls = 'zero'; text = '⚠ Exceeds balance! Available: ' + balance; }
      else if (qty > 0 && remaining < minStock && minStock > 0) { cls = 'low'; text = 'Remaining after: ' + remaining + ' (below min ' + minStock + ')'; }
      else if (qty > 0) { text = 'Remaining after: ' + remaining; }
      hint.className = 'balance-hint ' + cls;
      hint.textContent = text;
    } else if (txnType === 'Adjustment') {
      hint.textContent = 'Current: ' + balance + ' (will be: ' + (balance + qty) + ')';
    } else {
      hint.textContent = '';
    }
  }

  function collectPayload(confirmNeg) {
    const lines = [];
    document.querySelectorAll('#itemsTbody tr').forEach(tr => {
      const code = (tr.querySelector('.item-code').value || '').trim();
      const qty = tr.querySelector('.item-qty').value;
      if (code && qty !== '') {
        lines.push({
          itemCode: code,
          itemName: tr.dataset.itemName || '',
          unit: tr.dataset.itemUnit || '',
          qty: Number(qty)
        });
      }
    });

    return {
      txnType:        document.getElementById('txnType').value,
      date:           document.getElementById('txnDate').value,
      sourceLocation: document.getElementById('sourceLocation').value,
      destLocation:   document.getElementById('destLocation') ? document.getElementById('destLocation').value : '',
      lpo:            document.getElementById('lpo').value,
      supplier:       document.getElementById('supplier').value,
      requester:      document.getElementById('requester').value,
      receiver:       document.getElementById('receiver').value,
      notes:          document.getElementById('notes').value,
      lines:          lines,
      confirmNegativeAdjustment: !!confirmNeg
    };
  }

  async function submitEntry(confirmNeg) {
    const payload = collectPayload(confirmNeg);
    if (payload.lines.length === 0) {
      renderEntryAlerts(['Add at least one item with a valid quantity'], [], 'error');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    showSpinner();

    try {
      const result = await callApi('api_submitTransaction', payload);
      hideSpinner();
      btn.disabled = false;

      if (result.requiresConfirmation) {
        const warnings = result.warnings.join('<br>');
        showModal(`
          <h3 class="text-warning">⚠ Confirmation Required</h3>
          <div class="alert alert-warning">${warnings}</div>
          <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn btn-danger" onclick="closeModal(); submitEntry(true);">Proceed Anyway</button>
          </div>
        `);
        return;
      }

      if (result.success) {
        showToast('✓ Saved: ' + result.txnId, 'success');
        renderEntryAlerts([], result.warnings, 'success', result.txnId);
        clearCache();
        resetEntry(true);
      } else {
        renderEntryAlerts(result.errors.map(e => (e.row ? 'Row ' + e.row + ': ' : '') + e.message), result.warnings, 'error');
      }
    } catch (e) {
      hideSpinner();
      btn.disabled = false;
      renderEntryAlerts(['Error: ' + e.message], [], 'error');
    }
  }

  function renderEntryAlerts(errors, warnings, type, txnId) {
    const box = document.getElementById('entry-alerts');
    let html = '';
    if (errors && errors.length) {
      html += '<div class="alert alert-error"><strong>❌ Cannot save transaction:</strong><ul>' +
              errors.map(e => '<li>' + escapeHtml(e) + '</li>').join('') + '</ul></div>';
    }
    if (warnings && warnings.length) {
      html += '<div class="alert alert-warning"><strong>⚠ Warnings:</strong><ul>' +
              warnings.map(w => '<li>' + escapeHtml(w) + '</li>').join('') + '</ul></div>';
    }
    if (type === 'success' && txnId) {
      html = '<div class="alert alert-success"><strong>✓ Transaction saved successfully</strong> — TxnID: <code>' + escapeHtml(txnId) + '</code></div>' + html;
    }
    box.innerHTML = html;
    if (html) box.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // ─── Paste Quantities Feature ───────────────────────────────────

  /**
   * Paste a column of quantities from Excel into existing item rows.
   * One number per line → mapped to rows in order (top to bottom).
   * Rows without a qty in the paste are left unchanged.
   */
  function showPasteQtyModal() {
    const rows = document.querySelectorAll('#itemsTbody tr');
    const count = rows.length;

    showModal(`
      <h3>📋 Paste Quantities</h3>
      <p class="text-muted" style="font-size:0.88rem;margin-bottom:0.75rem;">
        Copy a single column of quantities from Excel, then paste below.<br>
        Numbers are mapped to rows <strong>in order</strong> — one number per line.
        ${count > 0 ? '<br>Currently <strong>' + count + ' row(s)</strong> in the table.' : ''}
      </p>

      <div style="background:#f8fafc;border:1px solid #e5e7eb;border-radius:6px;
                  padding:0.6rem 0.75rem;font-family:monospace;font-size:0.78rem;
                  color:#6b7280;margin-bottom:0.75rem;">
        Example:&nbsp;&nbsp;10<br>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;5<br>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;3<br>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;0&nbsp;&nbsp;← leaves row unchanged
      </div>

      <textarea id="pasteQtyTextarea"
        rows="8"
        style="font-family:monospace;font-size:0.9rem;resize:vertical;"
        placeholder="Paste quantities here (Ctrl+V)..."
        oninput="onPasteQtyInput(this)"></textarea>

      <div id="pasteQtyPreview" style="margin-top:0.6rem;font-size:0.82rem;color:#6b7280;"></div>

      <div class="modal-actions" style="margin-top:1rem;">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-success" onclick="applyPastedQty()">✅ Apply Quantities</button>
      </div>
    `);

    setTimeout(() => {
      const ta = document.getElementById('pasteQtyTextarea');
      if (ta) ta.focus();
    }, 100);
  }

  function onPasteQtyInput(ta) {
    const nums = parseQtyList(ta.value);
    const preview = document.getElementById('pasteQtyPreview');
    if (!preview) return;
    if (nums.length === 0) { preview.textContent = ''; return; }

    const rows = document.querySelectorAll('#itemsTbody tr');
    const mapped = Math.min(nums.length, rows.length);
    preview.innerHTML =
      nums.length + ' number(s) detected → will fill <strong>' + mapped + '</strong> row(s)' +
      (nums.length > rows.length
        ? ' <span class="text-warning">(extra numbers ignored — add more rows first)</span>'
        : '') +
      (nums.length < rows.length
        ? ' <span class="text-muted">(remaining ' + (rows.length - nums.length) + ' rows unchanged)</span>'
        : '');
  }

  /** Parse pasted text into array of numbers. Skips blanks and zeros. */
  function parseQtyList(text) {
    return text.split('\n')
      .map(l => l.trim().replace(/,/g, '.'))   // handle comma decimals
      .filter(l => l !== '')
      .map(l => parseFloat(l))
      .filter(n => !isNaN(n));
  }

  /** Apply parsed quantities to table rows in order. */
  function applyPastedQty() {
    const ta = document.getElementById('pasteQtyTextarea');
    if (!ta || !ta.value.trim()) return;

    const nums = parseQtyList(ta.value);
    if (nums.length === 0) {
      showToast('No valid numbers found', 'error');
      return;
    }

    const rows = document.querySelectorAll('#itemsTbody tr');
    let applied = 0;

    rows.forEach((tr, idx) => {
      if (idx >= nums.length) return;          // no more numbers
      const qty = nums[idx];
      if (qty === 0) return;                   // 0 = skip this row

      const qtyInput = tr.querySelector('.item-qty');
      if (qtyInput) {
        qtyInput.value = qty;
        qtyInput.style.borderColor = '';       // clear any warning highlight
        updateBalanceHint(tr);
        applied++;
      }
    });

    closeModal();
    showToast('✅ ' + applied + ' quantity/quantities applied', 'success');
  }

  function resetEntry(keepAlerts) {
    document.querySelectorAll('#itemsTbody tr').forEach(tr => tr.remove());
    window.__entryRowIndex = 0;
    addItemRow();
    addItemRow();
    addItemRow();
    document.getElementById('lpo').value = '';
    document.getElementById('supplier').value = '';
    document.getElementById('requester').value = '';
    document.getElementById('receiver').value = '';
    document.getElementById('notes').value = '';
    document.getElementById('txnDate').value = todayString();
    if (!keepAlerts) document.getElementById('entry-alerts').innerHTML = '';
  }
</script>
