<script>
  // ─── Stock View (Keeper: own store / Admin: pick store) ──────────
  async function renderStockView(container) {
    container.innerHTML = '<div class="card"><div class="text-center"><div class="spinner"></div></div></div>';

    const [stock, locations] = await Promise.all([
      callApi('api_getMyStock'),
      getLocations()
    ]);

    const isAdmin  = App.user.role === 'Admin';

    // Collect unique categories and units from data
    const categories = [...new Set(stock.map(s => s.category).filter(Boolean))].sort();
    const units      = [...new Set(stock.map(s => s.unit).filter(Boolean))].sort();

    // Store chips — all selected by default
    window.__stockSelectedLocs = new Set(locations.map(l => l.storeCode));

    container.innerHTML = `
      <div class="card">
        <div class="card-header">
          <h2>📦 Stock</h2>
          <button class="btn btn-sm btn-secondary" onclick="resetStockFilters()">↺ Reset</button>
        </div>

        <!-- KPI bar -->
        <div class="kpi-grid" id="stockKpis"></div>

        <!-- Filter panel -->
        <div class="filter-panel" id="stockFilterPanel">

          <!-- Row 1: Quick filter + Location + Category + Unit -->
          <div class="filter-row">
            <div class="filter-field">
              <label>Status</label>
              <div class="btn-group" id="stockFilterBtns">
                <button class="btn btn-sm btn-secondary" data-filter="instock" onclick="setStockFilter('instock')">In Stock</button>
                <button class="btn btn-sm btn-secondary" data-filter="alerts"  onclick="setStockFilter('alerts')">⚠ Alerts</button>
                <button class="btn btn-sm btn-secondary" data-filter="all"     onclick="setStockFilter('all')">All</button>
              </div>
            </div>

            ${isAdmin ? `
            <div class="filter-field" style="flex:none;">
              <label>Store</label>
              <div class="store-chips" id="stockLocChips">
                ${locations.map(l => `
                  <button class="store-chip active"
                          data-loc="${escapeHtml(l.storeCode)}"
                          onclick="toggleStockLoc('${escapeHtml(l.storeCode)}')"
                          title="${escapeHtml(l.storeName)}">
                    ${escapeHtml(l.storeCode)}
                  </button>`).join('')}
              </div>
            </div>` : ''}

            <div class="filter-field">
              <label>Category</label>
              <select id="stockCatFilter" onchange="applyStockFilters()">
                <option value="">All Categories</option>
                ${categories.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('')}
              </select>
            </div>

            <div class="filter-field">
              <label>Unit</label>
              <select id="stockUnitFilter" onchange="applyStockFilters()">
                <option value="">All Units</option>
                ${units.map(u => `<option value="${escapeHtml(u)}">${escapeHtml(u)}</option>`).join('')}
              </select>
            </div>
          </div>

          <!-- Row 2: Search + Balance range + Min stock -->
          <div class="filter-row">
            <div class="filter-field" style="flex:2;">
              <label>Search</label>
              <input type="text" id="stockSearch" placeholder="Code or name…" oninput="applyStockFilters()">
            </div>

            <div class="filter-field">
              <label>Balance ≥</label>
              <input type="number" id="stockBalMin" min="0" placeholder="0" style="width:90px;"
                     oninput="applyStockFilters()">
            </div>

            <div class="filter-field">
              <label>Balance ≤</label>
              <input type="number" id="stockBalMax" min="0" placeholder="∞" style="width:90px;"
                     oninput="applyStockFilters()">
            </div>

            <div class="filter-field">
              <label>Min Stock</label>
              <select id="stockMinStockFilter" onchange="applyStockFilters()">
                <option value="">Any</option>
                <option value="set">Has Min Set</option>
                <option value="none">No Min Defined</option>
              </select>
            </div>
          </div>

        </div>

        <!-- Results count -->
        <div id="stockCount" class="text-muted" style="font-size:0.82rem;padding:0.35rem 0;"></div>

        <!-- Table -->
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th onclick="sortStock('itemCode')" style="cursor:pointer;">Code ↕</th>
                <th>Name</th>
                <th onclick="sortStock('category')" style="cursor:pointer;">Category ↕</th>
                ${isAdmin ? '<th onclick="sortStock(\'location\')" style="cursor:pointer;">Location ↕</th>' : ''}
                <th class="text-end" onclick="sortStock('balance')" style="cursor:pointer;">Balance ↕</th>
                <th>Unit</th>
                <th class="text-end">Min</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="stockTbody"></tbody>
          </table>
        </div>
      </div>
    `;

    window.__stockData   = stock;
    window.__stockSort   = { col: 'balance', dir: -1 };
    window.__stockFilter = 'instock';

    setStockFilter('instock', false);
  }

  // ── Quick-filter button ──────────────────────────────────────────
  function setStockFilter(filter, noRefresh) {
    window.__stockFilter = filter;
    document.querySelectorAll('#stockFilterBtns .btn').forEach(function(btn) {
      const active = btn.dataset.filter === filter;
      btn.classList.toggle('btn-primary',   active);
      btn.classList.toggle('btn-secondary', !active);
    });
    if (!noRefresh) applyStockFilters();
  }

  // ── Toggle a store chip ──────────────────────────────────────────
  function toggleStockLoc(storeCode) {
    const sel = window.__stockSelectedLocs;
    if (sel.has(storeCode)) {
      // Don't allow deselecting all
      if (sel.size === 1) return;
      sel.delete(storeCode);
    } else {
      sel.add(storeCode);
    }
    // Update chip appearance
    document.querySelectorAll('#stockLocChips .store-chip').forEach(function(chip) {
      chip.classList.toggle('active', sel.has(chip.dataset.loc));
    });
    applyStockFilters();
  }

  // ── Reset all filters ────────────────────────────────────────────
  function resetStockFilters() {
    ['stockSearch', 'stockCatFilter', 'stockUnitFilter',
     'stockBalMin', 'stockBalMax', 'stockMinStockFilter'].forEach(function(id) {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    // Re-select all stores
    if (window.__stockSelectedLocs) {
      document.querySelectorAll('#stockLocChips .store-chip').forEach(function(chip) {
        window.__stockSelectedLocs.add(chip.dataset.loc);
        chip.classList.add('active');
      });
    }
    setStockFilter('instock');
  }

  // ── Sort ─────────────────────────────────────────────────────────
  function sortStock(col) {
    const s = window.__stockSort;
    s.dir = (s.col === col) ? s.dir * -1 : -1;
    s.col = col;
    applyStockFilters();
  }

  // ── Combined filter + sort + render ─────────────────────────────
  function applyStockFilters() {
    const search       = (document.getElementById('stockSearch')         ? document.getElementById('stockSearch').value         : '').toLowerCase();
    const catFilter    =  document.getElementById('stockCatFilter')       ? document.getElementById('stockCatFilter').value       : '';
    const unitFilter   =  document.getElementById('stockUnitFilter')      ? document.getElementById('stockUnitFilter').value      : '';
    const balMinRaw    =  document.getElementById('stockBalMin')          ? document.getElementById('stockBalMin').value          : '';
    const balMaxRaw    =  document.getElementById('stockBalMax')          ? document.getElementById('stockBalMax').value          : '';
    const minStockMode =  document.getElementById('stockMinStockFilter')  ? document.getElementById('stockMinStockFilter').value  : '';
    const filter       =  window.__stockFilter || 'instock';
    const { col, dir } =  window.__stockSort;
    const selectedLocs =  window.__stockSelectedLocs;

    const balMin = balMinRaw !== '' ? Number(balMinRaw) : null;
    const balMax = balMaxRaw !== '' ? Number(balMaxRaw) : null;

    let rows = window.__stockData.slice();

    // Status quick-filter
    if (filter === 'instock') rows = rows.filter(s => s.balance > 0);
    else if (filter === 'alerts') rows = rows.filter(s => s.status !== 'OK');

    // Store chips (Admin only — selectedLocs is undefined for Keeper)
    if (selectedLocs) rows = rows.filter(s => selectedLocs.has(s.location));

    // Category
    if (catFilter) rows = rows.filter(s => (s.category || '') === catFilter);

    // Unit
    if (unitFilter) rows = rows.filter(s => s.unit === unitFilter);

    // Balance range
    if (balMin !== null) rows = rows.filter(s => s.balance >= balMin);
    if (balMax !== null) rows = rows.filter(s => s.balance <= balMax);

    // Min stock status
    if (minStockMode === 'set')  rows = rows.filter(s => s.minStock > 0);
    if (minStockMode === 'none') rows = rows.filter(s => !s.minStock || s.minStock === 0);

    // Text search
    if (search) {
      rows = rows.filter(s =>
        s.itemCode.toLowerCase().includes(search) ||
        s.itemName.toLowerCase().includes(search)
      );
    }

    // Sort
    rows.sort(function(a, b) {
      const va = typeof a[col] === 'string' ? (a[col] || '').toLowerCase() : (a[col] || 0);
      const vb = typeof b[col] === 'string' ? (b[col] || '').toLowerCase() : (b[col] || 0);
      return va < vb ? -dir : va > vb ? dir : 0;
    });

    updateStockKpis(rows);
    renderStockRows(rows);
  }

  // ── KPI bar (clickable) ──────────────────────────────────────────
  function updateStockKpis(visibleRows) {
    const all     = window.__stockData;
    const inStock = all.filter(s => s.balance > 0).length;
    const low     = all.filter(s => s.status === 'LOW').length;
    const zero    = all.filter(s => s.status === 'ZERO').length;
    const el      = document.getElementById('stockKpis');
    if (!el) return;
    el.innerHTML = `
      <div class="kpi kpi-success" style="cursor:pointer;" onclick="setStockFilter('instock')">
        <div class="kpi-label">In Stock</div><div class="kpi-value">${inStock}</div>
      </div>
      <div class="kpi kpi-warning" style="cursor:pointer;" onclick="setStockFilter('alerts')">
        <div class="kpi-label">Below Min</div><div class="kpi-value">${low}</div>
      </div>
      <div class="kpi kpi-danger" style="cursor:pointer;" onclick="setStockFilter('alerts')">
        <div class="kpi-label">Zero Stock</div><div class="kpi-value">${zero}</div>
      </div>
      <div class="kpi" style="cursor:pointer;" onclick="setStockFilter('all')">
        <div class="kpi-label">Total Items</div><div class="kpi-value">${all.length}</div>
      </div>
    `;
  }

  // ── Table rows ───────────────────────────────────────────────────
  function renderStockRows(rows) {
    const tbody   = document.getElementById('stockTbody');
    const countEl = document.getElementById('stockCount');
    const isAdmin = App.user.role === 'Admin';
    const cols    = isAdmin ? 8 : 7;

    if (rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="${cols}" class="text-center text-muted" style="padding:2rem;">No items match the current filters</td></tr>`;
      if (countEl) countEl.textContent = '';
      return;
    }

    if (countEl) countEl.textContent = 'Showing ' + rows.length + ' item' + (rows.length !== 1 ? 's' : '');

    tbody.innerHTML = rows.map(s => `
      <tr>
        <td><code>${escapeHtml(s.itemCode)}</code></td>
        <td>${escapeHtml(s.itemName)}</td>
        <td class="text-muted" style="font-size:0.83rem;">${escapeHtml(s.category || '—')}</td>
        ${isAdmin ? `<td>${escapeHtml(s.location)}</td>` : ''}
        <td class="text-end"><strong>${s.balance}</strong></td>
        <td>${escapeHtml(s.unit)}</td>
        <td class="text-end text-muted">${s.minStock || '—'}</td>
        <td>${statusBadge(s.status)}</td>
      </tr>
    `).join('');
  }
</script>
